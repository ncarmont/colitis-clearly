<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="oliveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Olive fruit -->
  <ellipse cx="50" cy="55" rx="28" ry="35" fill="url(#oliveGradient)"/>

  <!-- Highlight on olive -->
  <ellipse cx="42" cy="45" rx="8" ry="12" fill="#34d399" opacity="0.4"/>

  <!-- Leaf -->
  <ellipse cx="60" cy="20" rx="12" ry="25" fill="#10b981" transform="rotate(25 60 20)"/>

  <!-- Leaf highlight -->
  <ellipse cx="58" cy="15" rx="4" ry="10" fill="#34d399" opacity="0.5" transform="rotate(25 58 15)"/>

  <!-- Small stem -->
  <rect x="58" y="18" width="3" height="12" fill="#059669" transform="rotate(15 59 18)"/>
</svg>
