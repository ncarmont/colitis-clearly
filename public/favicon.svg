<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4845f"/>
      <stop offset="100%" stop-color="#f9a87a"/>
    </linearGradient>
    <linearGradient id="sh" x1="16" y1="0" x2="16" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Coral gradient rounded square -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>
  <!-- Top sheen -->
  <rect width="32" height="14" rx="7.5" fill="url(#sh)"/>
  <!-- C arc — stylised colon/gut shape, opens right -->
  <path
    d="M22 9.5C19.8 8.3 17.5 7.6 15.1 7.6C9.9 7.6 5.8 11.8 5.8 17.1C5.8 22.4 9.9 26.5 15.1 26.5C17.5 26.5 19.7 25.8 22 24.5"
    stroke="white" stroke-width="2.1" stroke-linecap="round" fill="none" stroke-opacity="0.95"
  />
  <!-- Subtle inner highlight arc -->
  <path
    d="M18.5 12.7C17.1 11.9 15.4 11.5 13.8 11.6"
    stroke="white" stroke-width="1.0" stroke-linecap="round" fill="none" stroke-opacity="0.35"
  />
  <!-- Arc endpoint dots -->
  <circle cx="22" cy="9.5" r="2.1" fill="white" fill-opacity="0.95"/>
  <circle cx="22" cy="24.5" r="2.1" fill="white" fill-opacity="0.95"/>
</svg>
