<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Olive oil icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#65a30d"/>
      <stop offset="100%" stop-color="#3f6212"/>
    </linearGradient>
  </defs>

  <!-- rounded app tile -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bg)"/>
  <rect x="11" y="11" width="106" height="106" rx="22" fill="#ffffff" opacity="0.96"/>

  <!-- olive oil bottle -->
  <rect x="55" y="28" width="18" height="10" rx="3" fill="#334155"/>
  <rect x="52" y="37" width="24" height="14" rx="5" fill="#475569"/>
  <rect x="45" y="50" width="38" height="48" rx="12" fill="#1f2937"/>
  <rect x="48" y="53" width="32" height="42" rx="10" fill="url(#glass)"/>
  <rect x="52" y="58" width="24" height="3" rx="1.5" fill="#d97706" opacity="0.9"/>
  <rect x="52" y="64" width="24" height="3" rx="1.5" fill="#d97706" opacity="0.8"/>

  <!-- olive + leaf mark -->
  <ellipse cx="40" cy="84" rx="12" ry="10" fill="url(#olive)"/>
  <ellipse cx="33" cy="79" rx="5" ry="3" fill="#84cc16" opacity="0.55"/>
  <path d="M35 71c6-7 15-9 24-6-7 6-15 9-24 6Z" fill="#22c55e"/>

  <!-- tiny shine -->
  <path d="M56 55c-4 5-5 16-4 31" stroke="#fff" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
</svg>
