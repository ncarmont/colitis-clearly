<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#08111c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="50%" style="stop-color:#00bfa5"/>
      <stop offset="100%" style="stop-color:#f1b544"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Gradient border -->
  <rect x="8" y="8" width="496" height="496" rx="100" ry="100" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.7"/>
  <!-- CC text -->
  <text x="256" y="310" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="240" fill="white" text-anchor="middle" letter-spacing="16">CC</text>
  <!-- Subtle emerald glow dot -->
  <circle cx="256" cy="420" r="20" fill="#00c853" opacity="0.6"/>
</svg>
